name: Build Windows Installer

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # When secrets are set, electron-builder signs the app (SmartScreen / publisher name).
      # Repo → Settings → Secrets: WINDOWS_CODESIGN_PFX_BASE64, WINDOWS_CODESIGN_PFX_PASSWORD
      # Note: cannot use `secrets` in step `if:` (workflow schema); skip inside the script when empty.
      - name: Prepare code signing certificate
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PFX_BASE64)) {
            Write-Host "WINDOWS_CODESIGN_PFX_BASE64 not set; building unsigned installer."
            exit 0
          }
          $path = Join-Path $env:GITHUB_WORKSPACE "codesign.pfx"
          $bytes = [Convert]::FromBase64String($env:PFX_BASE64)
          [IO.File]::WriteAllBytes($path, $bytes)
          "CSC_LINK=$path" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Windows installer
        run: npm run dist
        env:
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ollama-Desktop-App-Windows
          path: release/*.exe

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
